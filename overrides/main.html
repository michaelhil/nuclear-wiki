{% extends "base.html" %}

{% block extrahead %}
  <meta name="wiki-version" content="{{ config.extra.wiki_version | default('dev') }}">
  <style>
    .wiki-feedback-icon {
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      margin-left: 0.4em;
      font-size: 0.7em;
      vertical-align: middle;
      user-select: none;
    }
    h2:hover .wiki-feedback-icon,
    h3:hover .wiki-feedback-icon,
    .wiki-feedback-icon:focus { opacity: 0.6; }
    .wiki-feedback-icon:hover { opacity: 1; }

    .feedback-popover {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--md-default-bg-color, #fff);
      border: 1px solid var(--md-default-fg-color--lightest, #ccc);
      border-radius: 8px;
      padding: 1.5rem;
      width: min(420px, 90vw);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      z-index: 1000;
      font-size: 0.9rem;
    }
    .feedback-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 999;
    }
    .feedback-popover h4 { margin: 0 0 0.8rem; font-size: 1rem; }
    .feedback-popover .section-ref {
      font-size: 0.8rem; color: var(--md-default-fg-color--light);
      margin-bottom: 0.8rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .feedback-popover label { display: block; margin: 0.6rem 0 0.2rem; font-weight: 500; }
    .feedback-popover .radio-group { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .feedback-popover .radio-group label { font-weight: 400; display: flex; align-items: center; gap: 0.3rem; }
    .feedback-popover textarea {
      width: 100%; min-height: 80px; padding: 0.5rem;
      border: 1px solid var(--md-default-fg-color--lightest, #ccc);
      border-radius: 4px; font: inherit; resize: vertical;
      background: var(--md-default-bg-color, #fff);
      color: var(--md-default-fg-color, #333);
    }
    .feedback-popover input[type="text"] {
      width: 100%; padding: 0.4rem 0.5rem;
      border: 1px solid var(--md-default-fg-color--lightest, #ccc);
      border-radius: 4px; font: inherit;
      background: var(--md-default-bg-color, #fff);
      color: var(--md-default-fg-color, #333);
    }
    .feedback-popover button[type="submit"] {
      margin-top: 0.8rem; padding: 0.5rem 1.5rem;
      background: var(--md-primary-fg-color, #4051b5);
      color: #fff; border: none; border-radius: 4px;
      cursor: pointer; font: inherit; font-weight: 500;
    }
    .feedback-popover button[type="submit"]:hover { opacity: 0.9; }
    .feedback-popover button[type="submit"]:disabled { opacity: 0.5; cursor: wait; }
    .feedback-toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      background: var(--md-primary-fg-color, #4051b5);
      color: #fff; padding: 0.7rem 1.5rem;
      border-radius: 6px; z-index: 1001;
      animation: fadeout 3s forwards;
    }
    @keyframes fadeout { 0%,70% { opacity: 1; } 100% { opacity: 0; } }
  </style>
{% endblock %}

{% block content %}
  {{ super() }}
  <script>
    (function() {
      const WORKER_URL = '{{ config.extra.feedback_worker_url | default("") }}';
      const WIKI_VERSION = document.querySelector('meta[name="wiki-version"]')?.content || 'unknown';
      const PAGE_PATH = location.pathname.replace(/^\/nuclear-wiki\//, '').replace(/\/$/, '') + '.md';

      // Inject feedback icons into h2 and h3 headings
      document.querySelectorAll('article h2[id], article h3[id]').forEach(function(heading) {
        var icon = document.createElement('span');
        icon.className = 'wiki-feedback-icon';
        icon.textContent = '\uD83D\uDCAC';
        icon.title = 'Send feedback on this section';
        icon.tabIndex = 0;
        icon.setAttribute('role', 'button');
        icon.setAttribute('aria-label', 'Send feedback on: ' + heading.textContent.trim());
        icon.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          openFeedback(heading);
        });
        heading.appendChild(icon);
      });

      function openFeedback(heading) {
        // Remove any existing popover
        closeFeedback();

        var sectionId = heading.id;
        var sectionTitle = heading.textContent.replace('\uD83D\uDCAC', '').trim();

        var backdrop = document.createElement('div');
        backdrop.className = 'feedback-backdrop';
        backdrop.addEventListener('click', closeFeedback);

        var popover = document.createElement('div');
        popover.className = 'feedback-popover';
        popover.innerHTML =
          '<h4>Section feedback</h4>' +
          '<div class="section-ref">' + sectionTitle + '</div>' +
          '<form id="feedback-form">' +
            '<label>Type</label>' +
            '<div class="radio-group">' +
              '<label><input type="radio" name="category" value="correction" checked> Correction</label>' +
              '<label><input type="radio" name="category" value="suggestion"> Suggestion</label>' +
              '<label><input type="radio" name="category" value="missing"> Missing</label>' +
              '<label><input type="radio" name="category" value="unclear"> Unclear</label>' +
            '</div>' +
            '<label for="fb-text">Your feedback</label>' +
            '<textarea id="fb-text" name="feedback" required placeholder="What should change about this section?"></textarea>' +
            '<label for="fb-name">Name (optional)</label>' +
            '<input type="text" id="fb-name" name="submitter" placeholder="Your name">' +
            '<button type="submit">Submit</button>' +
          '</form>';

        document.body.appendChild(backdrop);
        document.body.appendChild(popover);
        popover.querySelector('textarea').focus();

        popover.querySelector('form').addEventListener('submit', function(e) {
          e.preventDefault();
          var btn = popover.querySelector('button[type="submit"]');
          var now = Date.now();
          if (now - lastSubmitTime < 30000) {
            var secs = Math.ceil((30000 - (now - lastSubmitTime)) / 1000);
            alert('Please wait ' + secs + ' seconds before submitting again.');
            return;
          }
          btn.disabled = true;
          btn.textContent = 'Submitting...';

          var data = {
            page: PAGE_PATH,
            section: sectionId,
            sectionTitle: sectionTitle,
            category: popover.querySelector('input[name="category"]:checked').value,
            feedback: popover.querySelector('textarea').value,
            submitter: popover.querySelector('input[name="submitter"]').value || 'Anonymous',
            wikiVersion: WIKI_VERSION
          };

          if (!WORKER_URL) {
            console.log('Feedback (no worker configured):', data);
            closeFeedback();
            showToast('Feedback recorded (demo mode)');
            return;
          }

          fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          })
          .then(function(r) {
            if (!r.ok) throw new Error('Status ' + r.status);
            lastSubmitTime = Date.now();
            closeFeedback();
            showToast('Thank you — feedback submitted');
          })
          .catch(function(err) {
            btn.disabled = false;
            btn.textContent = 'Submit';
            alert('Could not submit feedback. Please try again.\n\n(' + err.message + ')');
          });
        });
      }

      // Debounce: track last submission time, block for 30s
      var lastSubmitTime = 0;

      function closeFeedback() {
        var b = document.querySelector('.feedback-backdrop');
        var p = document.querySelector('.feedback-popover');
        if (b) b.remove();
        if (p) p.remove();
      }

      function showToast(msg) {
        var toast = document.createElement('div');
        toast.className = 'feedback-toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3200);
      }

      // Close on Escape
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeFeedback();
      });
    })();
  </script>
{% endblock %}
